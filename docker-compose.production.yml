version: '3.8'

services:
  # ===========================================
  # Redis - for rate limiting & token blacklist
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: neuronflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - neuronflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # PostgreSQL - Production Database
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: neuronflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neuronflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: neuronflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuronflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuronflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Backend API Server
  # ===========================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neuronflow-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://neuronflow:${POSTGRES_PASSWORD}@db:5432/neuronflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BASE_URL: https://${DOMAIN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neuronflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Nginx - Reverse Proxy with HTTPS
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: neuronflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - server
    networks:
      - neuronflow-net

networks:
  neuronflow-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs: